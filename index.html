function slotRaw(key){
  try{
    let raw=localStorage.getItem(key);

  }catch(e){return null;}
}
function slotLabel(key,i){
  const raw=slotRaw(key);
  if(!raw)return null;
  try{const d=JSON.parse(raw);

}

function mkMember(cls,lv){
  const c=CLASSES[cls];
  let hp=c.hp,mp=c.mp,atk=c.atk,def=c.def,agi=c.agi||5;
  for(let l=2;l<=lv;l++){hp+=c.g.hp;mp+=c.g.mp;atk+=c.g.atk;def+=c.g.def;if(l%2===0)agi+=(c.g.agi||1);}
  return {cls,name:c.name,lv,hp,maxhp:hp,mp,maxmp:mp,batk:atk,bdef:def,agi,status:{poison:false,sleep:0},exp:0,weapon:null,armor:null};
}
function mAtk(m){return m.batk+(m.weapon?m.weapon.v:0);}
function mDef(m){return m.bdef+(m.armor?m.armor.v:0);}
const TACTICS={manual:'めいれいさせろ',gungan:'ガンガンいこうぜ',inochi:'いのちだいじに'};
const LV_CAP=30;
function expNext(m){return m.lv>=LV_CAP?Infinity:m.lv*m.lv*6;}
function knownSpells(m){return CLASSES[m.cls].learns.filter(l=>m.lv>=l.lv).map(l=>Object.assign({key:l.key},SPELL_DEFS[l.key]));}
function aliveMembers(){return party.filter(m=>m.hp>0);}

// ---------------- セーブ／ロード ----------------
function storageOK(){
  try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true;}catch(e){return false;}
}
function saveGame(saveKeyArg){
  if(!storageOK())return false;
  try{
    localStorage.setItem(saveKeyArg||SAVE_SLOTS[0],JSON.stringify({
      v:3,party,gold:P.gold,herbs:P.herbs,waters:P.waters,bag:P.equipBag,visited:G.visited,tactic:G.tactic,dex:G.dex,map:P.map,x:P.x,y:P.y,dir:P.dir,
      joined:G.joined,gotTreasure:G.gotTreasure,cleared:G.cleared,cleared2:G.cleared2,flags:G.flags}));
    return true;
  }catch(e){return false;}
}
function hasSave(){
  if(!storageOK())return false;
  return SAVE_SLOTS.some(k=>!!slotRaw(k));
}
function loadGame(loadKeyArg){
  try{
    let raw=null;
    if(loadKeyArg)raw=slotRaw(loadKeyArg);
    else{for(const k of SAVE_SLOTS){raw=slotRaw(k);if(raw)break;}}
    const d=JSON.parse(raw);
    if(!d||d.v!==3||!d.party)return false;
    party=d.party;
    P.gold=d.gold;P.herbs=d.herbs;P.waters=d.waters||0;P.equipBag=d.bag||[];G.visited=d.visited||{alba:true};G.tactic=d.tactic||'manual';G.dex=d.dex||{};P.map=d.map;P.x=d.x;P.y=d.y;P.dir=d.dir||0;
    party.forEach(m=>{
      if(m.agi==null){const c=CLASSES[m.cls];m.agi=(c.agi||5)+Math.floor(m.lv/2)*(c.g.agi||1);}
      m.status={poison:false,sleep:0};
    });
    G.joined=d.joined||{};G.gotTreasure=d.gotTreasure||{};G.cleared=!!d.cleared;G.cleared2=!!d.cleared2;G.flags=Object.assign(G.flags,d.flags||{});
    G.trail=[];
    return true;
  }catch(e){return false;}
}

const mf = m => 440 * Math.pow(2, (m - 69) / 12); // MIDI → Hz

const F = {

const SEQ = [

const CH = [
  [48,"maj",5,"C"],   [55,"maj",2,"G"],   [57,"min",2,"Am"],  [50,"maj",2.5,"D"],
  [48,"maj",4,"C"],   [57,"min",2.5,"Am"],[50,"maj",.5,"D"],  [52,"maj",.5,"E"],

const DYN = [[0,.72],[5,.78],[7,.42],[15.5,.5],[18,.58],[26,.68],[29.5,.78],[39,.9],[43,1],[50,1],[52.25,.95],[56.25,.8],[60.25,.55]];
const dynAt = b => {
  for (let i = 1; i < DYN.length; i++) {
    if (b <= DYN[i][0]) {
      const [x0,y0] = DYN[i-1], [x1,y1] = DYN[i];
      return y0 + (y1-y0) * ((b-x0)/(x1-x0 || 1));
    }
  }
  return .55;
};

const TIMP = [0,5,9,15.5,18,22,26.25,29.5,35.75,39.25,41.25,41.75,42.125,42.4375,42.6875,42.875,43,46.75,50.25,52.25,56.25];

const PASSES = [
  { tempo: 0.94, dyn: 0.80, semi: 0, picc: false, perc: false, intimate: true, wet: 0.42 },

function makeHall(ctx, seconds = 2.9) {
  const len = Math.floor(ctx.sampleRate * seconds);
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      const decay = Math.pow(1 - i / len, 2.4);
      d[i] = (Math.random() * 2 - 1) * decay * (i < ctx.sampleRate * 0.012 ? 0.35 : 1);
    }
  }
  const cv = ctx.createConvolver();
  cv.buffer = buf;
  return cv;
}

function playBrass(ctx, dest, freq, t, dur, vol, bright = 1) {
  if (freq <= 0 || vol <= 0.002) return;
  const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
  const g1 = ctx.createGain(), g2 = ctx.createGain(), env = ctx.createGain();
  const bp = ctx.createBiquadFilter(), lp = ctx.createBiquadFilter();
  const vib = ctx.createOscillator(), vg = ctx.createGain();

  o1.type = "sawtooth"; o1.frequency.value = freq;
  o2.type = "sawtooth"; o2.frequency.value = freq * 1.0028;
  g1.gain.value = 0.55; g2.gain.value = 0.45;

  bp.type = "bandpass"; bp.frequency.value = freq * 2.5 * bright; bp.Q.value = 0.65;
  lp.type = "lowpass";
  lp.frequency.setValueAtTime(Math.min(freq * 4, 3000), t);
  lp.frequency.linearRampToValueAtTime(Math.min(freq * 9 * bright, 6500), t + Math.min(0.09, dur * 0.3));

  vib.type = "sine"; vib.frequency.value = 5.5;
  vg.gain.setValueAtTime(0, t);
  vg.gain.linearRampToValueAtTime(freq * 0.011, t + Math.min(0.22, dur * 0.35));

  const att = Math.min(0.035, dur * 0.12), rel = Math.min(0.14, dur * 0.22);
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + att);
  env.gain.setValueAtTime(vol * 0.87, t + Math.max(att, dur - rel));
  env.gain.linearRampToValueAtTime(0, t + dur);

  vib.connect(vg); vg.connect(o1.frequency); vg.connect(o2.frequency);
  o1.connect(g1); o2.connect(g2);
  [g1, g2].forEach(g => g.connect(bp));
  bp.connect(lp); lp.connect(env); env.connect(dest);

  const s = t + dur + 0.15;
  [o1, o2, vib].forEach(o => { o.start(t); o.stop(s); });
}

function playStrings(ctx, dest, freq, t, dur, vol) {
  if (freq <= 0 || vol <= 0.002) return;
  const env = ctx.createGain(), lp = ctx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = Math.min(freq * 6, 3400); lp.Q.value = 0.4;

  [0, 7, -6].forEach((cent, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = i === 2 ? "triangle" : "sawtooth";
    o.frequency.value = freq;
    o.detune.value = cent;
    g.gain.value = i === 2 ? 0.5 : 0.35;
    o.connect(g); g.connect(lp);
    o.start(t); o.stop(t + dur + 0.5);
  });

  const att = Math.min(0.32, dur * 0.4), rel = Math.min(0.45, dur * 0.45);
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + att);
  env.gain.setValueAtTime(vol * 0.9, t + Math.max(att, dur - rel));
  env.gain.linearRampToValueAtTime(0, t + dur + 0.25);

  lp.connect(env); env.connect(dest);
}

function playBass(ctx, dest, freq, t, dur, vol) {
  if (freq <= 0) return;
  const o = ctx.createOscillator(), sub = ctx.createOscillator();
  const env = ctx.createGain(), lp = ctx.createBiquadFilter();
  o.type = "sawtooth"; o.frequency.value = freq;
  sub.type = "sine"; sub.frequency.value = freq / 2;
  lp.type = "lowpass"; lp.frequency.value = 520;

  const sg = ctx.createGain(); sg.gain.value = 0.55;
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + 0.05);
  env.gain.exponentialRampToValueAtTime(Math.max(vol * 0.4, 0.001), t + dur * 0.8);
  env.gain.linearRampToValueAtTime(0, t + dur + 0.1);

  o.connect(lp); sub.connect(sg); sg.connect(lp);
  lp.connect(env); env.connect(dest);
  [o, sub].forEach(x => { x.start(t); x.stop(t + dur + 0.2); });
}

function playPluck(ctx, dest, freq, t, vol) {
  if (freq <= 0 || vol <= 0.002) return;
  const o = ctx.createOscillator(), env = ctx.createGain(), lp = ctx.createBiquadFilter();
  o.type = "triangle"; o.frequency.value = freq;
  lp.type = "lowpass"; lp.frequency.setValueAtTime(freq * 7, t);
  lp.frequency.exponentialRampToValueAtTime(Math.max(freq * 1.4, 200), t + 0.5);
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + 0.006);
  env.gain.exponentialRampToValueAtTime(0.0008, t + 0.75);
  o.connect(lp); lp.connect(env); env.connect(dest);
  o.start(t); o.stop(t + 0.85);
}

function playTimpani(ctx, dest, freq, t, vol) {
  const o = ctx.createOscillator(), env = ctx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(freq * 1.9, t);
  o.frequency.exponentialRampToValueAtTime(freq, t + 0.08);
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + 0.006);
  env.gain.exponentialRampToValueAtTime(0.0008, t + 1.1);
  o.connect(env); env.connect(dest);
  o.start(t); o.stop(t + 1.2);

  const n = ctx.createBufferSource();
  const b = ctx.createBuffer(1, ctx.sampleRate * 0.09, ctx.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 4);
  n.buffer = b;
  const nf = ctx.createBiquadFilter(); nf.type = "lowpass"; nf.frequency.value = 900;
  const ng = ctx.createGain(); ng.gain.value = vol * 0.5;
  n.connect(nf); nf.connect(ng); ng.connect(dest);
  n.start(t);
}

function playBell(ctx, dest, freq, t, vol) {
  if (vol <= 0.002) return;
  [[1, 1], [2.76, 0.42], [5.4, 0.24], [8.9, 0.12]].forEach(([r, a]) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = freq * r;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol * a, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0006, t + 3.2 / (1 + r * 0.35));
    o.connect(g); g.connect(dest);
    o.start(t); o.stop(t + 3.4);
  });
}

function playSnare(ctx, dest, t, vol) {
  if (vol <= 0.002) return;
  const n = ctx.createBufferSource();
  const len = Math.floor(ctx.sampleRate * 0.16);
  const b = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  n.buffer = b;
  const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1400;
  const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 3200; bp.Q.value = 0.6;
  const env = ctx.createGain();
  env.gain.setValueAtTime(vol, t);
  env.gain.exponentialRampToValueAtTime(0.0008, t + 0.14);
  n.connect(hp); hp.connect(bp); bp.connect(env); env.connect(dest);
  n.start(t); n.stop(t + 0.2);
}

function playSwell(ctx, dest, t, dur, vol) {
  const n = ctx.createBufferSource();
  const len = Math.floor(ctx.sampleRate * (dur + 0.6));
  const b = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  n.buffer = b;
  const hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 3800;
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + dur * 0.55);
  env.gain.exponentialRampToValueAtTime(0.0008, t + dur + 0.55);
  n.connect(hp); hp.connect(env); env.connect(dest);
  n.start(t); n.stop(t + dur + 0.6);
}

const TOTAL_BEATS = SEQ.reduce((s, [, b]) => s + b, 0);
const rootAt = pos => {
  let acc = 0;
  for (const [r, , l] of CH) { acc += l; if (pos < acc) return r; }
  return CH[CH.length - 1][0];
};

// ── tsx go() 内の schedulePass を逐語移植（UI更新のみ除去・依存を引数化） ──
const RIT_FROM = TOTAL_BEATS - 5;
function schedulePass(ctx, bus, wet, bpm, p, start) {
  const beat = 60 / (bpm * p.tempo);
  const tr = Math.pow(2, p.semi / 12);
  const warp = b => (p.finale && b > RIT_FROM) ? b + Math.pow(b - RIT_FROM, 2) * 0.055 : b;
  const T = b => start + warp(b) * beat;
  const DL = (b, len) => (warp(b + len) - warp(b)) * beat;
  const D = b => Math.min(1.2, dynAt(b) * p.dyn);

  wet.gain.setValueAtTime(p.wet, Math.max(ctx.currentTime, start - 0.05));

  let b = 0;
  SEQ.forEach(([f, len]) => {
    const dur = DL(b, len) * (len >= 1 ? 0.97 : 0.9);
    const dy = D(b);
    if (f > 0) {
      playBrass(ctx, bus, f * tr, T(b), dur, 0.29 * (0.55 + dy * 0.55), p.intimate ? 0.82 : 1);
      if (dy > (p.intimate ? 0.76 : 0.66))
        playBrass(ctx, bus, f * tr / 2, T(b), dur, 0.10 * dy, 0.55);
      if (dy > 0.9 && f < F.C5) playBrass(ctx, bus, f * tr * 2, T(b), dur, 0.06 * dy, 0.9);
      if (p.picc && dy > 0.62 && f < F.C5)
        playBrass(ctx, bus, f * tr * 2, T(b), dur, 0.055 * dy * p.dyn, 1.15);
    }
    b += len;
  });

  let cb = 0;
  CH.forEach(([root, type, len], ci) => {
    const dy = D(cb);
    const nextSame = CH[ci + 1] && CH[ci + 1][0] === root && CH[ci + 1][1] === type;
    const dur = DL(cb, len) + (nextSame ? 0.18 : 0.05);
    const strIn = !p.intimate || cb >= 5;
    const bassIn = !p.intimate || cb >= 11.5;
    const sc = p.intimate ? 0.72 : 1;

    if (strIn) {
      TRIAD[type].forEach((iv, k) => {
        playStrings(ctx, bus, mf(root + 12 + iv) * tr, T(cb), dur, 0.052 * dy * sc * (k === 0 ? 1 : 0.85));
      });
      if (!p.intimate || cb >= 29.5)
        playStrings(ctx, bus, mf(root + 24 + TRIAD[type][2]) * tr, T(cb), dur, 0.034 * dy * sc);
      if (p.picc) playStrings(ctx, bus, mf(root + 24) * tr, T(cb), dur, 0.026 * dy);
    }
    if (bassIn) playBass(ctx, bus, mf(root) * tr, T(cb), dur, 0.17 * (0.6 + dy * 0.5) * sc);

    const roll = p.intimate ? [0, TRIAD[type][2], 12] : [0, ...TRIAD[type], 12, TRIAD[type][2] + 12, 24];
    roll.forEach((iv, k) => {
      playPluck(ctx, bus, mf(root + 12 + iv) * tr, T(cb) + k * 0.05, 0.048 * dy * sc * (1 - k * 0.06));
    });
    const arpZone = p.picc ? cb >= 15.5 : (cb >= 36 && cb < 46.75);
    if (arpZone && len >= 1) {
      const tones = [TRIAD[type][2], 12, TRIAD[type][1] + 12, 12];
      for (let s = 2; s < Math.floor(len / 0.5); s++) {
        playPluck(ctx, bus, mf(root + 12 + tones[s % tones.length]) * tr, T(cb + s * 0.5), 0.030 * dy);
      }
    }
    cb += len;
  });

  TIMP.forEach(pos => {
    const isRoll = pos > 41.2 && pos < 43;
    if (p.intimate && (isRoll || (pos < 29.5 && pos !== 0))) return;
    const dy = D(pos);
    const g = isRoll ? (0.055 + 0.075 * ((pos - 41.25) / 1.75)) * p.dyn
                     : 0.20 * dy * (p.intimate ? 0.7 : 1);
    playTimpani(ctx, bus, mf(rootAt(pos) - 12) * tr, T(pos), g);
  });

  CYM.forEach(pos => {
    if (p.intimate && pos !== 43) return;
    playSwell(ctx, bus, T(Math.max(0, pos - 1.2)), 1.2 * beat, 0.034 * D(pos));
  });

  if (p.perc) {
    for (let s = 0; s * 0.5 < TOTAL_BEATS; s++) {
      const pos = s * 0.5;
      const dy = D(pos);
      if (dy < 0.55) continue;
      const onBeat = pos % 1 === 0;
      playSnare(ctx, bus, T(pos), (onBeat ? 0.055 : 0.026) * dy * p.dyn);
      if (onBeat && dy > 0.85) playSnare(ctx, bus, T(pos) + beat * 0.25, 0.020 * dy);
    }
  }

  if (p.bells) {
    [0, 15.5, 29.5, 43, 52.25, 56.25].forEach(pos => {
      playBell(ctx, bus, mf(rootAt(pos) + 12) * tr, T(pos), 0.055 * D(pos));
    });
  }

  if (p.bridge) {
    for (let k = 0; k < 7; k++) {
      const pos = TOTAL_BEATS - 1 + (k / 7) * 0.95;
      playTimpani(ctx, bus, mf(rootAt(0) - 12) * tr, T(pos), 0.05 + k * 0.018);
    }
    playSwell(ctx, bus, T(TOTAL_BEATS - 1.6), 1.6 * beat, 0.05);
  }

  if (p.finale) {
    const fb = 56.25;
    const fT = T(fb), fDur = DL(fb, 4) + 1.6;
    const rt = rootAt(fb);
    playBell(ctx, bus, mf(rt + 24) * tr, fT, 0.07);
    [0, 4, 7, 12, 16, 19].forEach((iv, k) => {
      playStrings(ctx, bus, mf(rt + 12 + iv) * tr, fT, fDur, 0.05 * (1 - k * 0.07));
    });
    [0, 7, 12].forEach(iv => {
      playBrass(ctx, bus, mf(rt + 12 + iv) * tr, fT, fDur * 0.9, 0.09, 0.9);
    });
    playBass(ctx, bus, mf(rt) * tr, fT, fDur, 0.20);
    playBass(ctx, bus, mf(rt - 12) * tr, fT, fDur, 0.11);
    playSwell(ctx, bus, fT - 0.35, 1.0, 0.055);
    [0, 0.9, 1.7].forEach((d, k) => playTimpani(ctx, bus, mf(rt - 12) * tr, fT + d, 0.20 - k * 0.05));
  }

  return warp(TOTAL_BEATS) * beat;
}

// ── ゲーム統合ラッパー：3周構成をそのまま無限ループ ──
let ctx=null, master=null, wetRef=null, busRef=null, loopTimer=null;
function build(c){
  const m = c.createGain(); m.gain.value = 0.56;
  const dry = c.createGain(); dry.gain.value = 1;
  const wet = c.createGain(); wet.gain.value = 0.30;
  const hall = makeHall(c, 2.4);
  const comp = c.createDynamicsCompressor();
  comp.threshold.value = -21; comp.ratio.value = 6;
  comp.attack.value = 0.004; comp.release.value = 0.26;
  const bus = c.createGain();
  bus.connect(dry); bus.connect(hall);
  hall.connect(wet);
  dry.connect(m); wet.connect(m);
  m.connect(comp); comp.connect(c.destination);
  return {bus, wet, master:m};
}
return {
  playing:false,
  start(audioCtx){
    if(!audioCtx) return;
    this.stop();
    ctx = audioCtx;
    const b = build(ctx);
    busRef = b.bus; wetRef = b.wet; master = b.master;
    this.playing = true;
    const bpm = 96;
    const kick = () => {
      if(!this.playing) return;
      let t = ctx.currentTime + 0.1;
      const t00 = t;
      PASSES.forEach((p, pi) => {
        const last = pi === PASSES.length - 1;
        const dur = schedulePass(ctx, busRef, wetRef, bpm, { ...p, bridge: !last, finale: last }, t);
        t += dur;
      });
      loopTimer = setTimeout(kick, (t - t00 + 2.0) * 1000); // 終結の余韻2秒→再び1周目へ
    };
    kick();
  },
  stop(){
    this.playing = false;
    if(loopTimer){ clearTimeout(loopTimer); loopTimer = null; }
    if(master){ try{ master.gain.setValueAtTime(0, ctx ? ctx.currentTime : 0); master.disconnect(); }catch(e){} }
    master = null; busRef = null; wetRef = null; ctx = null;
  }
};
})();

const BGM={cur:null,step:0,timer:null,enabled:true,
  N:{C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
     C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,

  play(name){
    if(this.cur===name)return;
    this.cur=name;this.step=0;
    clearInterval(this.timer);
    if(window.FinalBGM&&FinalBGM.playing&&name!=='finalboss')FinalBGM.stop();
    if(!name)return;
    if(name==='finalboss'){ // ラスボス：原曲エンジンで再生
      if(this.enabled&&AU.ctx)FinalBGM.start(AU.ctx);
      return;
    }
    const th=this.THEMES[name];
    this.timer=setInterval(()=>this.tick(),60000/th.bpm/2);
  },
  stop(){this.cur=null;clearInterval(this.timer);if(window.FinalBGM)FinalBGM.stop();},
  tick(){
    if(!this.enabled||!AU.ctx||!this.cur)return;
    const th=this.THEMES[this.cur];
    const i=this.step%th.mel.length;
    const m=this.N[th.mel[i]],b=this.N[th.bass[i]];
    if(m)AU.tone(m,0.14,th.melType,0.035);
    if(b)AU.tone(b,0.2,'triangle',0.045);
    this.step++;
  },
};
function updateBGM(){
  if(G.mode==='title')return;
  if(G.battle){BGM.play((G.battle.named==='vox')?'finalboss':(G.battle.named?'boss':'battle'));return;}
  const towns={toros:1,toros_home:1,toros_house1:1,toros_house2:1,liberion:1,lib_house1:1,lib_house2:1,lib_house3:1,alba:1,village:1,river:1,nord:1};
  if(towns[P.map])BGM.play('town');

const AU={ctx:null,
  init(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}},
  tone(f,dur,type,vol,when){if(!this.ctx)return;const t=(when||0)+this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'square';o.frequency.value=f;
    g.gain.setValueAtTime(vol||0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(this.ctx.destination);o.start(t);o.stop(t+dur+0.02);},
  blip(){this.tone(880,0.06,'square',0.05);},
  hit(){this.tone(180,0.12,'sawtooth',0.09);this.tone(120,0.16,'square',0.06,0.03);},
  ecue(w){ // ふきつな よちょう（トライトーンの ゆらぎ）
    this.tone(311,0.11,'triangle',0.055,w||0);this.tone(220,0.13,'triangle',0.05,(w||0)+0.03);this.tone(156,0.10,'sine',0.04,(w||0)+0.06);},
  ehit(){ // よちょう→おもい だげき

// ---------------- メッセージ ----------------
const msgWin=document.getElementById('msg-win'),msgText=document.getElementById('msg-text'),msgArrow=document.getElementById('msg-arrow');
let curFull='';
function showMsg(lines,cb){
  const arr=Array.isArray(lines)?lines.slice():[lines];
  const pages=[];
  for(let i=0;i<arr.length;i+=3)pages.push(arr.slice(i,i+3).join('\n')); // 3行ずつ1窓に
  G.msgQ=pages;G.msgCb=cb||null;
  msgWin.style.display='block';nextMsg();
}
function nextMsg(){
  if(G.msgQ.length===0){msgWin.style.display='none';msgArrow.style.display='none';
    const cb=G.msgCb;G.msgCb=null;
    if(cb)cb();
    else if(!G.battle&&G.mode==='msg')G.mode='field'; // cbなしメッセージの復帰保険
    return;}
  const line=G.msgQ.shift();curFull=line;
  msgText.textContent='';msgArrow.style.display='none';G.typing=true;
  let i=0;
  G.typeTimer=setInterval(()=>{
    msgText.textContent=line.slice(0,++i);
    if(i>=line.length){clearInterval(G.typeTimer);G.typing=false;msgArrow.style.display='inline';}
  },16);
}
function advanceMsg(){
  if(G.typing){clearInterval(G.typeTimer);G.typing=false;
    msgText.textContent=curFull;msgArrow.style.display='inline';return;}
  nextMsg();
}

function drawArt(artDef,px,py,scale,flip,frame){
  const s=scale||2;const rows=artDef.art;
  const legRow=rows.length-(rows.length>=24?4:3); // 足元は歩行フレームで互い違い（24pxは4行）
  rows.forEach((row,y)=>{
    const legShift=(frame&&y>=legRow)?((frame+y)%2===0?1:-1):0;
    for(let x=0;x<row.length;x++){
      const c=row[x];if(c==='.'||c===' ')continue;
      const dx=flip?(row.length-1-x):x;
      ctx.fillStyle=artDef.pal[+c-1]||'#fff';
      ctx.fillRect(px+dx*s+legShift,py+y*s,s,s);}
  });
}

      break;}
    case 'w':{drawTile('_',px,py,x,y); // なにかが ひかっている
      if(!G.flags.pendant){
        ctx.fillStyle='#ffe080';ctx.fillRect(px+10,py+12,4,4);
        ctx.fillStyle='#fff8c0';ctx.fillRect(px+11,py+9,2,2);ctx.fillRect(px+11,py+17,2,2);
        ctx.fillRect(px+7,py+13,2,2);ctx.fillRect(px+15,py+13,2,2);}
      break;}
    case 'u':{ // 破れたページ（回収済みなら消える）
      const got=(P.map==='villageB'&&G.flags.page1)||(P.map==='nord'&&G.flags.page2)||(P.map==='river'&&G.flags.page3);
      drawTile(P.map==='villageB'?'o':'_',px,py,x,y);
      if(!got){
        ctx.fillStyle='#efe8d0';ctx.fillRect(px+7,py+8,11,9);
        ctx.fillStyle='#999';ctx.fillRect(px+9,py+11,7,1);ctx.fillRect(px+9,py+14,7,1);
        ctx.fillStyle='#c8b880';ctx.fillRect(px+15,py+8,3,3);}
      break;}
    case 'y':{drawTile('_',px,py,x,y); // 床の紋章：月
      ctx.strokeStyle=G.flags.page3&&G.flags.page1&&G.flags.page2?'#9ad0ff':'#556';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(px+12,py+12,7,0.6,5.7);ctx.stroke();ctx.lineWidth=1;
      break;}
    case 'z':{drawTile('_',px,py,x,y); // 床の紋章：星
      const cc=G.flags.page3&&G.flags.page1&&G.flags.page2?'#9ad0ff':'#556';
      ctx.strokeStyle=cc;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(px+12,py+4);ctx.lineTo(px+12,py+20);ctx.moveTo(px+4,py+12);ctx.lineTo(px+20,py+12);
      ctx.moveTo(px+7,py+7);ctx.lineTo(px+17,py+17);ctx.moveTo(px+17,py+7);ctx.lineTo(px+7,py+17);ctx.stroke();ctx.lineWidth=1;
      break;}
    case 'g':{drawTile('_',px,py,x,y); // 床の紋章：陽
      const c2=G.flags.page3&&G.flags.page1&&G.flags.page2?'#ffd870':'#556';
      ctx.strokeStyle=c2;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(px+12,py+12,6,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=c2;ctx.fillRect(px+11,py+11,3,3);ctx.lineWidth=1;
      break;}
    case 'i':{drawTile('_',px,py,x,y); // 隠し階段（開放後のみ）
      if(G.flags.shrineOpen){
        ctx.fillStyle='#20242c';ctx.fillRect(px+3,py+3,18,18);
        ctx.fillStyle='#4a5060';ctx.fillRect(px+5,py+5,14,5);ctx.fillRect(px+8,py+11,11,5);}
      break;}
    case 'O':{drawTile('_',px,py,x,y); // かがり火
      ctx.fillStyle='#3a3a44';ctx.fillRect(px+8,py+14,8,7);ctx.fillRect(px+6,py+20,12,2);
      const lit=(G._fire||[]).indexOf(x);
      if(lit>=0){
        const fc=['#ff4030','#40a0ff','#f0f0ff'][lit];
        ctx.fillStyle=fc;
        ctx.beginPath();ctx.moveTo(px+12,py+2);ctx.lineTo(px+7,py+14);ctx.lineTo(px+17,py+14);ctx.fill();
        ctx.fillStyle='#fff0c0';ctx.fillRect(px+11,py+9,2,4);}
      break;}
    case 'c':{drawTile('_',px,py,x,y); // 日記の台座
      ctx.fillStyle='#5a5a66';ctx.fillRect(px+8,py+10,8,11);
      if(!G.flags.diary){ctx.fillStyle='#8a6a3a';ctx.fillRect(px+6,py+6,12,6);
        ctx.fillStyle='#e0d8b8';ctx.fillRect(px+7,py+7,10,4);}
      break;}
    case 'U':{drawTile('_',px,py,x,y); // のぼり階段
      ctx.fillStyle='#8a7a5a';
      ctx.fillRect(px+4,py+16,16,5);ctx.fillRect(px+7,py+10,13,5);ctx.fillRect(px+10,py+4,10,5);
      ctx.fillStyle='#c8b890';ctx.fillRect(px+4,py+16,16,2);ctx.fillRect(px+7,py+10,13,2);ctx.fillRect(px+10,py+4,10,2);
      break;}
    case 'W':{drawTile('_',px,py,x,y); // まほうの結界
      if(!G.flags.castleSwitch){
        ctx.fillStyle='rgba(140,60,200,0.55)';ctx.fillRect(px+2,py,20,24);
        ctx.fillStyle='#d090ff';ctx.fillRect(px+6,py+2,2,20);ctx.fillRect(px+12,py+2,2,20);ctx.fillRect(px+18,py+2,2,20);}
      break;}
    case 'J':{drawTile('_',px,py,x,y); // 結界のそうち
      ctx.fillStyle='#555';ctx.fillRect(px+7,py+12,10,9);
      ctx.fillStyle=G.flags.castleSwitch?'#40d060':'#e04040';
      ctx.beginPath();ctx.arc(px+12,py+9,4,0,Math.PI*2);ctx.fill();
      break;}
    case 'E':case 'F':case 'H':{drawTile('_',px,py,x,y); // 転移のまほうじん（見た目は同じ）
      ctx.strokeStyle='#40d0e0';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(px+12,py+12,8,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;
      ctx.fillStyle='#a0f0ff';ctx.fillRect(px+11,py+11,3,3);
      break;}
    case 'L':{drawTile('_',px,py,x,y);
      if(!G.flags.castleDragon)drawArt(MIDBOSS.kokuryu,px,py,24/MIDBOSS.kokuryu.art.length);
      break;}
    case 'j':{drawTile('_',px,py,x,y); // とらわれの へいし
      ctx.fillStyle='#e0b090';ctx.fillRect(px+9,py+4,7,6);
      ctx.fillStyle='#4060a0';ctx.fillRect(px+8,py+10,9,9);
      ctx.fillStyle='#333';ctx.fillRect(px+9,py+19,3,4);ctx.fillRect(px+13,py+19,3,4);
      break;}
    case 'Z':{drawTile('_',px,py,x,y);
      if(G.cleared){ // クリア後にだけ現れる 地の底への穴
        ctx.fillStyle='#0a0014';ctx.beginPath();ctx.arc(px+12,py+13,9,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#8040c0';ctx.lineWidth=2;ctx.beginPath();ctx.arc(px+12,py+13,9,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;
        ctx.fillStyle='#c060e0';ctx.fillRect(px+11,py+4,2,3);}
      break;}
    case 'Q':{drawTile('_',px,py,x,y);
      if(!G.flags.trueClear)drawArt(MIDBOSS.kaos,px,py,24/MIDBOSS.kaos.art.length);
      else if(G.flags.rematchOn&&!G.flags.luminaClear){ // 解禁後：白竜と光の扉
        ctx.fillStyle='#eef2f8';ctx.globalAlpha=0.5;ctx.fillRect(px+1,py+1,TS-2,TS-2);ctx.globalAlpha=1;
        drawArt(LUMINA,px,py,24/LUMINA.art.length);
      }
      break;}
    case 'X':{drawTile('_',px,py,x,y);
      if(!G.flags.spider)drawArt(MIDBOSS.spider,px,py,24/MIDBOSS.spider.art.length);break;}
    case 'Y':{drawTile('_',px,py,x,y);
      if(!G.flags.crystal)drawArt(MIDBOSS.gargoyle,px,py,24/MIDBOSS.gargoyle.art.length);break;}
    default:{ctx.fillStyle='#2f8f3f';ctx.fillRect(px,py,TS,TS);}
  }
}
function drawNPCex(ch,px,py){
  if(ch==='@'){drawTile('_',px,py,0,0);drawArt(NPC_ARTS.garuld,px,py,1);return true;}   // 老ガルド 24x24

  if(ch==='='){drawTile('_',px,py,0,0); // ベッド
    ctx.fillStyle='#6a4a26';ctx.fillRect(px+2,py+2,20,20);
    ctx.fillStyle='#e8e8f0';ctx.fillRect(px+4,py+4,16,7);
    ctx.fillStyle='#a04040';ctx.fillRect(px+4,py+11,16,9);return true;}
  if(ch==='|'){drawTile('_',px,py,0,0); // 門扉
    if(!G.flags.ch1){ctx.fillStyle='#6a4a26';ctx.fillRect(px+2,py+2,20,20);
      ctx.fillStyle='#4a3418';for(let i=0;i<3;i++)ctx.fillRect(px+4+i*7,py+3,3,18);
      ctx.fillStyle='#8a8a94';ctx.fillRect(px+3,py+10,18,3);}
    return true;}
  if(ch==='$'){drawTile('_',px,py,0,0);if(!G.joined.kai)drawArt(CHAR_ARTS.kai,px,py,1);return true;}
  if(ch==='&'){drawTile('_',px,py,0,0);drawNPC(px,py,'#e8d8a0','#8a7030');return true;} // 説教師（金襴）
  if(ch==='!'){drawTile('_',px,py,0,0);drawArt(NPC_ARTS.guard,px,py,1);return true;}    // 王城衛兵
  if(ch==='a'){ // フィールド上の村アイコン（入口）
    ctx.fillStyle='#2f8f3f';ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#c8a86a';ctx.fillRect(px+4,py+18,16,4);          // 前の道
    ctx.fillStyle='#8a6236';ctx.fillRect(px+4,py+10,7,9);           // 小屋1
    ctx.fillStyle='#a04030';ctx.fillRect(px+3,py+7,9,4);
    ctx.fillStyle='#8a6236';ctx.fillRect(px+13,py+12,8,7);          // 小屋2
    ctx.fillStyle='#a04030';ctx.fillRect(px+12,py+9,10,4);
    ctx.fillStyle='#ffd54a';ctx.fillRect(px+7,py+14,2,2);           // 窓あかり
    return true;}
  if(ch==='H'){ // フィールド上の王都アイコン（入口）
    ctx.fillStyle='#2f8f3f';ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#9a9aa8';ctx.fillRect(px+2,py+8,20,13);          // 城壁
    ctx.fillStyle='#7a7a88';ctx.fillRect(px+2,py+8,20,3);
    ctx.fillStyle='#b8b8c4';ctx.fillRect(px+2,py+4,5,6);            // 左塔
    ctx.fillStyle='#b8b8c4';ctx.fillRect(px+17,py+4,5,6);           // 右塔
    ctx.fillStyle='#c03030';ctx.fillRect(px+3,py+1,3,3);ctx.fillRect(px+18,py+1,3,3); // 旗
    ctx.fillStyle='#6a4a26';ctx.fillRect(px+9,py+13,6,8);           // 門
    ctx.fillStyle='#e8c860';ctx.fillRect(px+11,py+16,2,2);
    return true;}
  if(ch==='^'){drawTile('_',px,py,0,0);if(!G.joined.mira)drawArt(CHAR_ARTS.miraOld,px,py,1);return true;} // ミラ（加入後は不在）
  if(ch==='?'){drawTile('_',px,py,0,0); // しょけんだい
    ctx.fillStyle='#6a4a26';ctx.fillRect(px+8,py+10,8,12);ctx.fillRect(px+5,py+6,14,6);
    ctx.fillStyle='#ece8dc';ctx.fillRect(px+6,py+5,12,5);
    ctx.fillStyle='#8a8478';ctx.fillRect(px+8,py+6,8,1);ctx.fillRect(px+8,py+8,8,1);
    return true;}
  if(ch==='*'){drawTile('_',px,py,0,0); // さいだん（ガロフ後は よこにずれて かいだんが みえる）
    if(!G.flags.garof){
      ctx.fillStyle='#8a8a94';ctx.fillRect(px+3,py+14,18,8);
      ctx.fillStyle='#d8a838';ctx.fillRect(px+5,py+12,14,3);
      drawNPC(px,py-6,'#ece8dc','#d8a838');
    }else{
      ctx.fillStyle='#101018';ctx.fillRect(px+2,py+11,10,11); // ちかへの あな
      ctx.fillStyle='#3a3a46';ctx.fillRect(px+3,py+12,8,2);ctx.fillRect(px+3,py+16,8,2); // かいだん
      ctx.fillStyle='#8a8a94';ctx.fillRect(px+13,py+14,10,8); // ずれた さいだん
      ctx.fillStyle='#d8a838';ctx.fillRect(px+14,py+12,8,3);
    }
    return true;}
  if(ch==='+'){drawTile('_',px,py,0,0); // たな
    ctx.fillStyle='#7a5a30';ctx.fillRect(px+2,py+3,20,18);
    ctx.fillStyle='#5a3e1e';ctx.fillRect(px+2,py+9,20,2);ctx.fillRect(px+2,py+15,20,2);
    ctx.fillStyle='#d8c060';ctx.fillRect(px+5,py+5,3,3);ctx.fillStyle='#80a860';ctx.fillRect(px+14,py+11,4,3);return true;}
  if(ch==='8'){ // ゆきの じめん
    ctx.fillStyle='#e8eef4';ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#d4dde8';if(((px>>4)+(py>>4))%3===0){ctx.fillRect(px+5,py+7,2,2);ctx.fillRect(px+15,py+15,2,2);}
    return true;}
  if(ch==='0'){ // ゆきの モミのき
    ctx.fillStyle='#e8eef4';ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#2a6a4a';ctx.beginPath();ctx.moveTo(px+12,py+2);ctx.lineTo(px+21,py+18);ctx.lineTo(px+3,py+18);ctx.closePath();ctx.fill();
    ctx.fillStyle='#f4f8fc';ctx.beginPath();ctx.moveTo(px+12,py+2);ctx.lineTo(px+16,py+9);ctx.lineTo(px+8,py+9);ctx.closePath();ctx.fill();
    ctx.fillStyle='#5a4020';ctx.fillRect(px+10,py+18,4,4);return true;}

    ctx.fillStyle=(P.map==='sandou1')?'#b8a888':'#e8eef4';
    if(P.map==='sandou1'){ctx.fillStyle='#b8a888';}else{ctx.fillStyle='#e8eef4';}
    ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#9ad4e8';ctx.beginPath();ctx.moveTo(px+12,py+3);ctx.lineTo(px+20,py+21);ctx.lineTo(px+4,py+21);ctx.closePath();ctx.fill();
    ctx.fillStyle='#d8f2fc';ctx.beginPath();ctx.moveTo(px+12,py+3);ctx.lineTo(px+15,py+12);ctx.lineTo(px+9,py+12);ctx.closePath();ctx.fill();
    return true;}
  if(ch==='p'){ // フィールド上の遺跡入口（雪原では雪地面）
    ctx.fillStyle=(P.map==='field4')?'#e8eef4':'#2f8f3f';ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#8a8a94';ctx.fillRect(px+3,py+6,4,15);ctx.fillRect(px+17,py+6,4,15); // 石柱
    ctx.fillStyle='#6a6a74';ctx.fillRect(px+2,py+4,20,4); // まぐさ石
    ctx.fillStyle='#a8a8b4';ctx.fillRect(px+3,py+6,4,2);ctx.fillRect(px+17,py+6,4,2);
    ctx.fillStyle='#101018';ctx.fillRect(px+8,py+10,8,11); // 奥の闇
    ctx.fillStyle='#63994a';ctx.fillRect(px+3,py+18,3,3);ctx.fillRect(px+18,py+12,2,3); // こけ
    return true;}
  if(ch==='l'||ch==='6'||ch==='7'){ // ひかりのだい
    drawTile('_',px,py,0,0);
    const lit=(ch==='l'&&G.flags.sancL1)||(ch==='6'&&G.flags.sancL2)||(ch==='7'&&G.flags.sancL3);
    ctx.fillStyle='#6a6a78';ctx.fillRect(px+7,py+12,10,10); // だいざ
    ctx.fillStyle='#8a8a98';ctx.fillRect(px+6,py+11,12,3);
    ctx.fillStyle=lit?'#ffe98a':'#3a3a52';ctx.fillRect(px+9,py+4,6,8); // すいしょう
    if(lit){ctx.fillStyle='rgba(255,235,140,0.35)';ctx.fillRect(px+5,py+1,14,13);}
    return true;}
  if(ch==='3'){ // 30ねんまえの やえいあと
    drawTile('_',px,py,0,0);
    ctx.fillStyle='#4a3a2a';ctx.fillRect(px+6,py+14,12,4); // きえた たきび
    ctx.fillStyle='#2a2a30';ctx.fillRect(px+9,py+12,6,3);
    ctx.fillStyle='#6a5a42';ctx.fillRect(px+4,py+17,4,2);ctx.fillRect(px+16,py+16,4,2); // まき
    return true;}

    drawTile('_',px,py,0,0);
    ctx.fillStyle='#7a7a86';ctx.fillRect(px+4,py+3,16,18); // せきばん
    ctx.fillStyle='#9a9aa8';ctx.fillRect(px+5,py+4,14,2);
    ctx.fillStyle='#3a3a46';for(let i=0;i<4;i++)ctx.fillRect(px+6,py+8+i*3,12,1);
    return true;}
  if(ch==='{'){ // くろき とびら（とびらの ま）
    drawTile('_',px,py,0,0);
    ctx.fillStyle='#0a0812';ctx.fillRect(px+1,py,22,22);

      drawNPC(px,py+6,'#efe9db','#d9a832'); // ゼフ
      ctx.fillStyle='#7cd8e8';ctx.fillRect(px+18,py+8,2,10); // つえ
    }else{
      ctx.fillStyle='#c8ccd8';ctx.fillRect(px+11,py+12,2,8); // レイのけん
      ctx.fillStyle='#d9a832';ctx.fillRect(px+10,py+11,4,2);

    ctx.beginPath();ctx.arc(px+12,py+12,9,0,6.29);ctx.stroke();

    ctx.fillStyle='#5a4020';ctx.fillRect(px+2,py+12,20,2);
    ctx.fillStyle='#8a6a3a';ctx.fillRect(px+11,py+3,2,10); // マスト
    ctx.fillStyle='#f0ead8';ctx.beginPath();ctx.moveTo(px+13,py+3);ctx.lineTo(px+20,py+9);ctx.lineTo(px+13,py+11);ctx.closePath();ctx.fill();

      ctx.fillStyle='rgba(140,180,220,0.55)';

      ctx.fillStyle='#7cd8e8';ctx.fillRect(px+17,py+2,4,3);
    }else{
      ctx.fillStyle='#7a5a30';ctx.fillRect(px+6,py+12,12,8); // しょけんだい
      ctx.fillStyle='#f4eee0';ctx.fillRect(px+7,py+8,10,5); // にっき
      ctx.fillStyle='#a07a42';ctx.fillRect(px+11,py+8,1,5);
    }
    return true;}
  if(ch===';'){ // さいだんあと：きょうそ と ヴォルグ
    ctx.fillStyle='#e8eef4';ctx.fillRect(px,py,TS,TS);
    ctx.fillStyle='#8a8a94';ctx.fillRect(px+2,py+16,20,6); // くずれた さいだん
    ctx.fillStyle='#d8a838';ctx.fillRect(px+4,py+14,16,3);
    if(!G.flags.vorug){
      drawNPC(px-8,py-4,'#ece8dc','#d8a838'); // きょうそ（はくきん）
      ctx.fillStyle='#26203a';ctx.fillRect(px+12,py+2,12,14); // ヴォルグの かげ
      ctx.fillStyle='#e03838';ctx.fillRect(px+15,py+6,2,2);ctx.fillRect(px+19,py+6,2,2);

function render(){
  const m=MAPS[P.map];
  const rows=m.tiles;const mw=rows[0].length,mh=rows.length;
  let camX=Math.max(0,Math.min(mw-VW,P.x-Math.floor(VW/2)));
  let camY=Math.max(0,Math.min(mh-VH,P.y-Math.floor(VH/2)));
  if(mw<=VW)camX=Math.floor((mw-VW)/2);
  if(mh<=VH)camY=Math.floor((mh-VH)/2);
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  for(let sy=0;sy<VH;sy++)for(let sx=0;sx<VW;sx++){
    const x=camX+sx,y=camY+sy;
    if(x<0||y<0||x>=mw||y>=mh)continue;
    drawTile(rows[y][x],sx*TS,sy*TS,x,y);
  }
  // 隊列：先頭=勇者、後ろに加入順で並ぶ（軌跡を辿る）
  for(let i=party.length-1;i>=1;i--){
    const t=G.trail[i-1];
    if(t&&t.map===P.map){drawArt(CHAR_ARTS[party[i].cls],(t.x-camX)*TS,(t.y-camY)*TS-((G.steps+i)%2),24/CHAR_ARTS[party[i].cls].art.length,P.dir===1,(G.steps+i)%2+1);}
  }
  drawArt(CHAR_ARTS.hero,(P.x-camX)*TS,(P.y-camY)*TS-(G.steps%2),24/CHAR_ARTS.hero.art.length,P.dir===1,G.steps%2+1);
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(4,4,150,18);
  ctx.fillStyle='#fff';ctx.font='11px monospace';
  ctx.fillText(m.name+'  Lv'+party[0].lv+'  '+party.length+'にん',10,17);
}

function tileAt(map,x,y){const rows=MAPS[map].tiles;if(y<0||y>=rows.length||x<0||x>=rows[0].length)return '#';return rows[y][x];}
function isBlocked(ch){
  if(SOLID.has(ch))return true;
  if(ch==='^')return !G.joined.mira; // 老ミラ：加入後は立ち去る
  if('KPISBnXYQ@%=+&!*^?'.includes(ch))return true;
  if('l67345'.includes(ch))return true; // 3しょう：ひかりのだい・やえいあと・きざみもじ・ルミア
  if(ch==='9'||ch===';')return true; // 4しょう：こおりのいわ・さいだんあとイベント
  if(ch===':'||ch===','||ch==='(')return true; // 5しょう：てんそうじん・まぼろし・ほんだな
  if(ch===')'||ch==='}'||ch==='{')return true; // 5しょう：ふね・とざされたもん／しゅうしょう：くろきとびら
  if(ch==='|')return !G.flags.ch1; // 村の門扉：ガルドの依頼で開く
  if(ch==='$')return !G.joined.kai; // カイ
  if(ch==='s')return G.flags.spider;
  if(ch==='C'&&!G.flags.crystal)return true; // 結界：やみのすいしょうが必要
  if(ch==='W')return !G.flags.castleSwitch; // 城内の結界：そうちで解除
  if(ch==='L')return !G.flags.castleDragon; // こくりゅう：たおすと通れる
  if(ch==='j')return true; // とらわれの へいし
  if(ch==='x')return true; // 瓦礫
  if(ch==='k')return G.flags.raid&&!G.flags.raidCleared; // ダルガ：撃退後は消える
  if('qbvw'.includes(ch))return true; // 墓・手記・ひかるもの
  if(ch==='u')return true; // 破れたページ
  if(ch==='O')return true; // かがり火
  if(ch==='i')return !G.flags.shrineOpen; // 隠し階段：封印中は入れない
  if(ch==='J')return true; // そうち（隣から調べる）
  if(RECRUIT_TILES[ch]&&!G.joined[RECRUIT_TILES[ch]])return true;
  return false;
}
function tryMove(dx,dy){
  if(G.mode!=='field')return;
  P.dir=dy>0?0:dy<0?3:dx<0?1:2;
  const nx=P.x+dx,ny=P.y+dy;
  const ch=tileAt(P.map,nx,ny);
  if(isBlocked(ch)){render();return;}
  // 隊列の軌跡を更新（移動前の位置を先頭に積む）
  if(P.map==='river'&&G.flags.page1&&G.flags.page2&&G.flags.page3&&!G.flags.shrineOpen&&'yzg'.includes(ch)){
    {
      const ch3=ch; // 移動先の紋章
      G._seq=G._seq||[];
      if(G._seq.length&&ch3===G._seq[G._seq.length-1]){/* 同じ紋章の踏み直しは無視 */}
      else{
      const need=['y','z','g'][G._seq.length];
      if(ch3===need){
        G._seq.push(ch3);AU.blip();
        if(G._seq.length===3){
          G.flags.shrineOpen=true;render();G.steps=0;
          G.mode='msg';
          showMsg(['ゴゴゴ……ゆかの いしが うごき、','かくし かいだんが あらわれた！'],()=>{G.mode='field';});
        }
      }else{
        G._seq=[];AU.hit();G.steps=0;
        G.mode='msg';
        showMsg(['ゆかの もんしょうが つめたく ひかった。','（じゅんばんが ちがう ようだ）'],()=>{G.mode='field';});
      }
      }
    }
  }
  G.trail.unshift({map:P.map,x:P.x,y:P.y});
  if(G.trail.length>4)G.trail.length=4;
  P.x=nx;P.y=ny;G.steps++;
  const m=MAPS[P.map];
  if(ch==='C'&&!G.flags.crystal){/* 結界に阻まれる（isBlockedで通れないが保険） */}
  if(m.warps&&m.warps[ch]&&!(ch==='Z'&&!G.cleared)&&!(ch==='i'&&!G.flags.shrineOpen)){ // 穴/隠し階段の開通条件
    const w=m.warps[ch];
    P.map=(w.to==='village'&&G.flags.raid)?'villageB':w.to; // 襲撃後のミスト村は焼け跡
    P.x=w.x;P.y=w.y;G.trail=[];
    if({alba:1,village:1,river:1,nord:1}[w.to])G.visited[w.to]=true; // リターン先を記録
    AU.blip();updateBGM();render();return;}
  if(m.warpsXY&&m.warpsXY[nx+','+ny]){ // 座標指定ワープ（1マップに複数ドア可）
    const w=m.warpsXY[nx+','+ny];
    if(w.need&&!G.joined[w.need]){ // 条件つきの扉
      G.mode='msg';render();
      showMsg(w.msg||['とびらは かたく とざされている。'],()=>{G.mode='field';});
      return;}
    if(w.needFlag&&!G.flags[w.needFlag]){ // フラグ条件の扉（3章：封印扉）
      G.mode='msg';render();
      showMsg(w.msg||['とびらは かたく とざされている。'],()=>{G.mode='field';});
      return;}
    P.map=w.to;P.x=w.x;P.y=w.y;G.trail=[];
    if({toros:1,liberion:1}[w.to])G.visited[w.to]=true; // LQ2：リターン先を記録
    AU.blip();updateBGM();render();return;}
  if(ch==='d'||ch==='e'){handleDock(ch);return;}
  if(ch==='t'){openTreasure(nx,ny);render();return;}
  render();
  if(m.enc&&Math.random()<(P.map==='castle'?0.10:0.08)&&G.steps>3){startBattle();}
}

      page2:['ふるい かみきれを みつけた。','「…たいようは のぼる。しんでんの ゆかに…」'],

    G._fire=G._fire||[];

    const xs=[];const t=MAPS[P.map].tiles;
    t.forEach(r=>{let x=r.indexOf('O');while(x>=0){xs.push(x);x=r.indexOf('O',x+1);}});
    xs.sort((a,b)=>a-b);
    const rank=xs.indexOf(fx);
    if(rank<0)return;
    if(G._fire.includes(fx)){say(['もう ともっている。']);return;}
    if(rank===G._fire.length){
      G._fire.push(fx);AU.spell();render();
      const cn=['あかき','あおき','しろき'][rank];
      if(G._fire.length===3){
        G.flags.firesLit=true;AU.win();render();
        say([cn+' ほのおが ともった。','──3つの ほのおが こだまし、やみが さけていく！','（めいおうの まへの みちが ひらけた）']);

    }else{
      G._fire=[];AU.hit();render();

  if(ch==='c'){ // ロイドの日記

      '「ふかみの 3つの かがりびは','あか、あお、しろの じゅんに ともせ。','ふういんの おくへの みちが ひらく」',

    }else if(F.cleared){

  if(ch==='b'){ // 古い墓石（ガルドの妹）
    const fx=P.x+(P.dir===2?1:P.dir===1?-1:0),fy=P.y+(P.dir===3?-1:P.dir===0?1:0);
    if(fx===2&&fy===1&&G.joined.warrior&&!F.sisterGrave){

        'ガルド「──いもうとだ。15ねんまえの かじで、',

        '「だから おれは、つよく なると きめたんだ。',

  if(ch==='Q'&&!F.firesLit&&!F.trueClear){

  }
  if(ch==='Q'){
    if(!F.trueClear)say(['くらやみの おくで ふたつの めが ひかった…','「よくぞ ここまで きた、にんげんよ。','ゾルデアを あやつっていたのは この わし──','めいおう ヴェルナーク。','しんの やみを みせてやろう！」'],()=>startBattle('kaos'));
    else if(F.rematchOn&&!F.luminaClear){

        'ちかづくと、こえが きこえた。',
        '「われは ルミナ。この せかいに さいしょに ひかりを ともした もの。',
        'めいおうすら、われの かげに すぎなかった。',
        'すべてを こえた ものよ──われを こえて みせよ！」'],()=>{
        startBattle('lumina');if(G.battle)G.battle.rematch='lumina';
      });
    }
    else if(F.luminaClear){
      say(['しろい ひかりの とびらは、しずかに とじている。',
        'はじまりの ルミナは、もう ここには いない。']);

    else if(F.crystal)say(['おうさま「けっかいを やぶったと きいた！','いざ、まおうじょうへ！ ぶうんを いのる！」']);
    else if(F.boat)say(['おうさま「かわを わたったか！ きたの ノルドの','まちで ＜けんじゃの とう＞の うわさを きくがよい。','まおうじょうの けっかいを やぶる かぎが あるはずじゃ」']);
    else if(G.joined.warrior)say(['おうさま「ガルドが なかまに なったか！','だが きたへの たいがは、ぬしが あばれて','わたれぬそうじゃ。ひがしの リバーサイドの','しんでんを たずねてみよ」']);
    else say(['おうさま「おお ゆうしゃよ、よくきた。','きたの まおうじょうに ゾルデアが よみがえった。','だが ひとりでは むぼうじゃ。','まずは にしの ミストむらに すむ','せんし ガルドを たずねるがよい」']);

  }
  // ===== 妹マリン（救出後の村）=====
  if(ch==='s'&&P.map==='villageB'){

      toros_house1:['「みやこの ほうじゃ 《ひかりのきょうだん》とかいう','しゅうだんが ひろまってるらしい。','＜しそルミナさまを よみがえらせよ＞……だとさ」'],
      toros_house2:['「ガルドさまは わかいころ、でんせつの ゆうしゃさまと','いっしょに たびを していたんだよ。','いまじゃ すっかり むらの おじいちゃんだがね」'],
      toros:F.kagebeast?['「ひろばに けものが でたんだって！？','アルトくんが たいじしたって ほんとかい！」']:

      alba:F.trueClear?['「せんだいゆうしゃロイドさまの むすこが せかいを','すくったんだと。おやこ 2だいの えいゆうさまだ！」']:

        F.boat?['「きたの くにには つよい まものが でるらしいぜ」']:['「にしの ミストむらへは、みちを にしへ ずっとだ」'],

        F.boat?['「ぬしさまが しずまった！ あんたたちの おかげだ」']:['「ぬしの グラードさまが あばれてなぁ…','しんでんの ミラさまに そうだんしてくれ」'],

          'ひがしの おかの とう？ ……ちかよらないほうが いい。',
          'よなよな あおい ひかりが ともるんだ」'],

  }
  // ===== 教会・宿・店 =====
  if(ch==='P'){openChurch();return;}
  if(ch==='I'){
    const price=INN_PRICE[P.map]||10;
    G.mode='msg';
    if(P.gold>=price)showMsg(['やどやへ ようこそ。ひとばん '+price+'ゴールドです。','…おはようございます！ みなさん げんきに なりました！'],()=>{P.gold-=price;party.forEach(m=>{if(m.hp>0){m.hp=m.maxhp;m.mp=m.maxmp;}});AU.heal();G.mode='field';});
    else showMsg(['やどやへ ようこそ。ひとばん '+price+'ゴールドです。','おきゃくさん、おかねが たりないようで…'],()=>{G.mode='field';});
    return;}
  if(ch==='S'){openShop();return;}
  // ===== 結界 =====
  if(ch==='C'&&!F.crystal){
    say(['くろい けっかいが ゆくてを はばんでいる…！','（＜やみのすいしょう＞の ちからが ひつようだ）']);

  }
  // ===== 魔王 =====
  if(ch==='B'&&!G.cleared){
    say(['ゾルデア「…よくぞ ここまで きた、にんげんども。','だが ここが きさまらの はかばだ！」'],()=>startBattle('zoldea'));
    return;}
  if(ch==='B'&&G.cleared){
    say(['ゾルデアの いた ばしょに、ふしぎな まどうじんが のこっている。',
      'てを かざすと、かこの てきの すがたが うかびあがった。',
      '（ここで かつての てきと さいせんできる）'],()=>{G.mode='menu';openArena();});
    return;
  }

// ---------------- 教会（回復・蘇生・セーブ） ----------------
const subWin=document.getElementById('sub-win');
function openChurch(){
  G.mode='church';G.menu={kind:'church',sel:0,items:['いのる（かいふく・そせい）','ぼうけんを きろくする','やめる']};
  renderSub('しんぷ「かみの みちびきを…」');
}
function renderSub(head){
  const m=G.menu;
  if(head)m.head=head;
  const useHead=m.head||'';
  let h=useHead?'<div style="margin-bottom:6px;color:#ffd54a;">'+useHead+'</div>':'';
  m.items.forEach((it,i)=>{
    h+='<div class="item'+(i===m.sel?' sel':'')+'" data-i="'+i+'">'+(typeof it==='string'?it:it.label)+(it&&it.price!=null?'<span class="price">'+it.price+'G</span>':'')+'</div>';
  });
  subWin.innerHTML=h;subWin.style.display='block';
  subWin.querySelectorAll('.item').forEach(el=>{el.onclick=()=>{m.sel=+el.dataset.i;subConfirm();};});
}
function subConfirm(){
  const m=G.menu;if(!m)return;
  if(m.kind==='church'){
    subWin.style.display='none';
    if(m.sel===0){
      party.forEach(mm=>{mm.hp=mm.maxhp;mm.mp=mm.maxmp;});
      AU.heal();G.mode='msg';
      showMsg(['しんぷ「そなたたちに しゅくふくを。」','（ぜんいんの HPとMPが かいふくした！）'],()=>{G.mode='field';});
    }else if(m.sel===1){
      if(!storageOK()){G.mode='msg';
        showMsg(['しんぷ「…もうしわけない、この かんきょうでは','きろくが できないようです。」','（ブラウザほぞんが つかえません）'],()=>{G.mode='field';});return;}
      G.menu={kind:'saveslot',sel:0,keys:SAVE_SLOTS.slice(),
        items:SAVE_SLOTS.map((k,i)=>({label:slotLabel(k,i)||('スロット'+(i+1)+'：─ あきち ─')})).concat([{label:'やめる'}])};
      renderSub('どの スロットに きろくする？');return;
    }else{G.mode='field';}
    return;
  }
  if(m.kind==='saveslot'){
    subWin.style.display='none';
    if(m.sel>=m.keys.length){G.mode='field';G.menu=null;return;}
    const ok=saveGame(m.keys[m.sel]);
    G.mode='msg';G.menu=null;
    if(ok){AU.save();showMsg(['しんぷ「スロット'+(m.sel+1)+'に きろくしました。」','（セーブ かんりょう！）'],()=>{G.mode='field';});}
    else showMsg(['きろくに しっぱいした…'],()=>{G.mode='field';});
    return;
  }
  if(m.kind==='shop'){confirmShop();return;}
  if(m.kind==='equip'){confirmEquip();return;}
  if(m.kind==='ftarget'){confirmFieldTarget();return;}
  if(m.kind==='btarget'){confirmBattleTarget();return;}
}
// ---------------- ショップ（装備は誰につけるか選ぶ） ----------------
function openShop(){
  G.mode='shop';G.menu={kind:'shop',sel:0,items:shopStock().concat([{label:'やめる'}])};
  renderShopList();
}
function renderShopList(){
  const m=G.menu;
  let h='<div style="margin-bottom:6px;color:#ffd54a;">ぶきとぼうぐの みせ（G:'+P.gold+'）</div>';
  m.items.forEach((it,i)=>{
    h+='<div class="item'+(i===m.sel?' sel':'')+'" data-i="'+i+'">'+(it.name||it.label)+(it.price!=null?'<span class="price">'+it.price+'G</span>':'')+'</div>';
  });
  subWin.innerHTML=h;subWin.style.display='block';
  subWin.querySelectorAll('.item').forEach(el=>{el.onclick=()=>{m.sel=+el.dataset.i;confirmShop();};});
}
function confirmShop(){
  const m=G.menu;const it=m.items[m.sel];
  if(!it||it.label==='やめる'){closeSub();G.mode='field';return;}
  if(P.gold<it.price){G.mode='msg';subWin.style.display='none';showMsg(['おかねが たりないよ。'],()=>{G.mode='shop';renderShopList();});return;}
  if(it.kind==='h'||it.kind==='wtr'){P.gold-=it.price;
    if(it.kind==='h')P.herbs++;else P.waters++;AU.blip();
    G.mode='msg';subWin.style.display='none';
    showMsg([it.name+'を かった！（もちもの:'+(it.kind==='h'?P.herbs:P.waters)+'）'],()=>{G.mode='shop';renderShopList();});return;}
  // 武器・防具：誰に装備するか
  G.menu={kind:'equip',sel:0,item:it,items:party.map(p=>({label:p.name+'（'+(it.kind==='w'?(p.weapon?p.weapon.name:'ぶきなし'):(p.armor?p.armor.name:'よろいなし'))+'）'})).concat([{label:'やめる'}])};
  renderSub('だれに そうびする？　'+it.name);
}
function confirmEquip(){
  const m=G.menu;
  if(m.sel>=party.length){G.mode='shop';G.menu={kind:'shop',sel:0,items:shopStock().concat([{label:'やめる'}])};renderShopList();return;}
  const it=m.item,tgt=party[m.sel];
  P.gold-=it.price;AU.blip();
  const lines=[it.name+'を かった！'];
  if(it.kind==='w'){
    if(!tgt.weapon||it.v>tgt.weapon.v){
      if(tgt.weapon)P.equipBag.push({kind:'w',name:tgt.weapon.name,v:tgt.weapon.v});
      tgt.weapon={name:it.name,v:it.v};lines.push(tgt.name+'は '+it.name+'を そうびした！');
    }else{P.equipBag.push({kind:'w',name:it.name,v:it.v});lines.push('（いまの ぶきのほうが つよいので ふくろに しまった）');}
  }else{
    if(!tgt.armor||it.v>tgt.armor.v){
      if(tgt.armor)P.equipBag.push({kind:'a',name:tgt.armor.name,v:tgt.armor.v});
      tgt.armor={name:it.name,v:it.v};lines.push(tgt.name+'は '+it.name+'を そうびした！');
    }else{P.equipBag.push({kind:'a',name:it.name,v:it.v});lines.push('（いまの よろいのほうが つよいので ふくろに しまった）');}
  }
  G.mode='msg';subWin.style.display='none';
  showMsg(lines,()=>{G.mode='shop';G.menu={kind:'shop',sel:0,items:shopStock().concat([{label:'やめる'}])};renderShopList();});
}
function closeSub(){subWin.style.display='none';G.menu=null;}

const statusWin=document.getElementById('status-win');
// そうび：メンバー選択→部位選択→ふくろから装備／はずす
function openEquipMember(){
  G.menu={kind:'emember',sel:0,
    items:party.map(p=>p.name+'（こ'+mAtk(p)+' し'+mDef(p)+'）').concat(['もどる'])};
  renderCmd(G.menu,'だれの そうび？');
}
function openEquipSlot(mi){
  const p=party[mi];
  G.menu={kind:'eslot',sel:0,mi,
    items:['ぶき：'+(p.weapon?p.weapon.name+'（+'+p.weapon.v+'）':'なし'),
           'ぼうぐ：'+(p.armor?p.armor.name+'（+'+p.armor.v+'）':'なし'),'もどる']};
  renderCmd(G.menu,p.name+'　こ'+mAtk(p)+' し'+mDef(p));
}
function openEquipList(mi,kind){
  const p=party[mi];
  const cur=kind==='w'?p.weapon:p.armor;
  const cands=P.equipBag.map((it,idx)=>({it,idx})).filter(o=>o.it.kind===kind);
  const items=cands.map(o=>o.it.name+'（+'+o.it.v+'）');
  if(cur)items.push('はずす');
  items.push('もどる');
  G.menu={kind:'elist',sel:0,mi,ekind:kind,cands,hasCur:!!cur,items};
  renderCmd(G.menu,(kind==='w'?'どの ぶきに する？':'どの ぼうぐに する？'));
}
// だいじなもの：手記・日記などの読み返し
function keyItemDefs(){
  const F=G.flags,ks=[];
  const pc=(F.page1?1:0)+(F.page2?1:0)+(F.page3?1:0);
  if(pc>0){
    const t=[];
    if(pc===3){
      t.push('──ロイドの し（かんせい）──','',
        '「つきは しずみ、ほしは めぐり、たいようは のぼる。',
        'しんでんの ゆかに その みちすじを しるした。',
        'たどる ものに、わしの こたえを のこす。──ロイド」');
      if(!F.shrineOpen)t.push('','（かわの しんでんの ゆかの もんしょうを、',
        'つき→ほし→たいようの じゅんに ふもう）');
    }else{
      t.push('──ちぎれた てき──');
      if(F.page1)t.push('「…つきは しずみ、ほしは めぐり…」');
      if(F.page2)t.push('「…たいようは のぼる。しんでんの ゆかに…」');
      if(F.page3)t.push('「…みちすじを しるした。たどる ものに、','わしの こたえを のこす。──R」');
      t.push('','（あと '+(3-pc)+'まい、どこかに ありそうだ）');
    }
    ks.push({n:pc===3?'ロイドの し':'ちぎれた てき（'+pc+'/3）',t});
  }
  if(F.diary)ks.push({n:'ロイドのにっき',t:[
    '──ロイドのにっき──','',
    '「めいおうの な、ヴェルナーク。',
    'やつは──かつて、にんげんだった」','',
    '「ふかみの 3つの かがりびは',
    'あか、あお、しろの じゅんに ともせ。',
    'ふういんの おくへの みちが ひらく」','',
    '「この さきへ すすむ ものへ。',
    'どうか、いきて かえってくれ。──ロイド」']});
  if(F.pendant)ks.push({n:'ロイドのペンダント',t:[
    'ふるびた ペンダント。','うらに ちいさく「ロイド」と きざまれている。',
    'ちちの ぬくもりが、まだ のこっている きがする。']});
  if(F.crystal)ks.push({n:'やみのすいしょう',t:[
    'けんじゃゼフより たくされた すいしょう。','まおうじょうの けっかいを やぶる ちからを ひめる。']});
  return ks;
}
function openKeyItems(){
  const ks=keyItemDefs();
  if(ks.length===0){fieldInfo(['だいじなものは、まだ もっていない。']);return;}
  G.menu={kind:'keyitem',sel:0,ks,items:ks.map(k=>k.n).concat(['もどる'])};
  renderCmd(G.menu,'だいじなもの');
}
// ワールドマップ
function openWorldMap(){
  G.mode='map';G.menu=null;
  cmdWin.style.display='none';statusWin.style.display='none';subWin.style.display='none';
  renderWorldMap();
}
function renderWorldMap(){
  const cur=MAPS[P.map];const t=cur.tiles;
  const mw=t[0].length,mh=t.length;
  const ts=Math.max(3,Math.min(12,Math.floor(Math.min((CW-16)/mw,(CH-56)/mh))));
  const ox=(CW-mw*ts)/2, oy=(CH-mh*ts)/2+10;
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  const lit1=G.flags.sancL1,lit2=G.flags.sancL2,lit3=G.flags.sancL3;
  const col={'M':'#5a4a38','~':'#2a5aa0','.':'#2f8f3f','f':'#1e6f2f','r':'#c9b37e','_':'#c9bd9a','#':'#3c4050',
    'D':'#8a5a2a','<':'#d8d8e8','>':'#22222e','t':'#ffd54a','d':'#8a6a3a','e':'#8a6a3a','p':'#a8a8b8',
    'l':lit1?'#ffe98a':'#6a6a90','6':lit2?'#ffe98a':'#6a6a90','7':lit3?'#ffe98a':'#6a6a90',
    'a':'#e04040','H':'#d8d8e8','A':'#e04040','V':'#a07040','R':'#4080e0','N':'#c8c8d8','C':'#8040c0','1':'#181818','2':'#e0e0f0'};
  for(let y=0;y<mh;y++)for(let x=0;x<mw;x++){
    const ch=t[y][x];
    let c=col[ch];
    if(!c){ // NPC・しかけは きんいろで しるす
      if('@%^?*&!=+$KPISBn5834:,()};{'.includes(ch))c='#e0c060';
      else c=cur.enc===false||'#_'.includes(t[0][0])?'#c9bd9a':'#2f8f3f';
    }
    ctx.fillStyle=c;ctx.fillRect(ox+x*ts,oy+y*ts,ts,ts);}
  // げんざいち（いまの マップの ざひょうを そのまま つかう＝ズレなし）
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.strokeRect(ox+P.x*ts-2,oy+P.y*ts-2,ts+4,ts+4);ctx.lineWidth=1;
  ctx.fillStyle='#ff4040';ctx.fillRect(ox+P.x*ts+1,oy+P.y*ts+1,Math.max(1,ts-2),Math.max(1,ts-2));
  ctx.fillStyle='#fff';ctx.font='12px monospace';
  ctx.fillText(cur.name+' の ちず',ox,oy-8);
  ctx.fillText('□=げんざいち　（A/Bで とじる）',ox,Math.min(CH-6,oy+mh*ts+16));
}
// モンスターずかん
function dexDefs(){
  return ENEMIES.concat([MIDBOSS.spider,MIDBOSS.nushi,MIDBOSS.gargoyle,MIDBOSS.darga,MIDBOSS.kokuryu,MIDBOSS.kaos,BOSS]);
}
function openDex(){
  const defs=dexDefs();
  const seen=defs.filter(e=>G.dex[e.key]&&G.dex[e.key].seen>0).length;
  const items=defs.map(e=>{
    const d=G.dex[e.key];
    return (d&&d.seen>0)?e.name+'　×'+d.kill:'？？？';
  });
  G.menu={kind:'dex',sel:0,items};
  renderSub('モンスターずかん（'+seen+'/'+defs.length+'）　×=とうばつすう');
}
function openFieldMenu(){
  if(G.mode!=='field')return;
  G.mode='menu';
  G.menu={kind:'fmenu',sel:0,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','だいじなもの','とじる']};
  renderCmd(G.menu,'メニュー');renderStatus(true);
}
function renderCmd(m,head){
  if(head)m.head=head;
  const _hd=m.head||'';
  let h=_hd?'<div class="_hd">'+_hd+'</div>':'';
  m.items.forEach((it,i)=>{h+='<div class="item'+(i===m.sel?' sel':'')+'" data-i="'+i+'">'+it+'</div>';});
  cmdWin.innerHTML=h;cmdWin.style.display='block';
  cmdWin.querySelectorAll('.item').forEach(el=>{el.onclick=()=>{m.sel=+el.dataset.i;
    if(G.mode==='battle')battleConfirm();else confirmCmd();};});
}
function renderStatus(show){
  if(!show){statusWin.style.display='none';return;}
  let h='';
  party.forEach(p=>{
    h+='<b style="color:'+(p.hp>0?'#ffd54a':'#888')+'">'+p.name+'</b> Lv'+p.lv+(p.hp<=0?'（しに）':'')+
      '<br>HP '+p.hp+'/'+p.maxhp+' MP '+p.mp+'/'+p.maxmp+
      ' こ'+mAtk(p)+' し'+mDef(p)+' す'+(p.agi||5)+'<br>'+
      '　<span style="color:#9ab">ぶき:'+(p.weapon?p.weapon.name:'なし')+' よろい:'+(p.armor?p.armor.name:'なし')+'</span><br>';
  });
  h+='G '+P.gold+'　やくそう '+P.herbs+'　せいすい '+P.waters;
  statusWin.innerHTML=h;statusWin.style.display='block';
}
function confirmCmd(){
  const m=G.menu;if(!m)return;
  if(m.kind==='fmenu'){
    const it=m.items[m.sel];
    if(it!=='つよさ')statusWin.style.display='none'; // つよさ画面の閉じ漏れ防止
    if(it==='とじる'){cmdWin.style.display='none';statusWin.style.display='none';G.mode='field';G.menu=null;return;}
    if(it==='つよさ'){renderStatus(true);return;}
    if(it==='どうぐ'){
      G.menu={kind:'fitem',sel:0,items:['やくそう ×'+P.herbs,'まほうのせいすい ×'+P.waters,'もどる']};
      renderCmd(G.menu,'どうぐ');return;}
    if(it==='そうび'){openEquipMember();return;}
    if(it==='だいじなもの'){openKeyItems();return;}
    if(it==='ちず'){openWorldMap();return;}
    if(it==='ずかん'){openDex();return;}
    if(it==='じゅもん'){
      const casts=[];
      aliveMembers().forEach(p=>{knownSpells(p).filter(sp=>['heal','healall','revive','return'].includes(sp.type)).forEach(sp=>casts.push({p,sp}));});
      if(casts.length===0){fieldInfo(['かいふくの じゅもんを つかえるものが いない。']);return;}
      G.menu={kind:'fspell',sel:0,casts,items:casts.map(c=>c.p.name+':'+c.sp.name+' MP'+c.sp.mp).concat(['もどる'])};
      renderCmd(G.menu,'どの じゅもん？');return;}
  }
  if(m.kind==='fitem'){
    if(m.sel===0){
      if(P.herbs<=0){fieldInfo(['やくそうを もっていない。']);return;}
      openFieldTarget({type:'herb'});return;}
    if(m.sel===1){
      if(P.waters<=0){fieldInfo(['まほうのせいすいを もっていない。']);return;}
      const tg=aliveMembers().filter(p=>p.maxmp>0);
      openFieldTarget({type:'water'},tg);return;}
    G.menu={kind:'fmenu',sel:1,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','だいじなもの','とじる']};renderCmd(G.menu,'メニュー');return;
  }
  if(m.kind==='fspell'){
    if(m.sel>=m.casts.length){G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','だいじなもの','とじる']};renderCmd(G.menu,'メニュー');return;}
    const c=m.casts[m.sel];
    if(c.p.mp<c.sp.mp){fieldInfo(['MPが たりない！']);return;}
    if(c.sp.type==='return'){
      const towns=Object.keys(G.visited).filter(k=>G.visited[k]);
      G.menu={kind:'freturn',sel:0,caster:c.p,sp:c.sp,towns,items:towns.map(t=>MAPS[t].name).concat(['やめる'])};
      renderCmd(G.menu,'どこへ もどる？');return;
    }
    if(c.sp.type==='healall'){
      c.p.mp-=c.sp.mp;AU.heal();
      const lines=[c.p.name+'は '+c.sp.name+'を となえた！'];
      aliveMembers().forEach(t=>{const heal=Math.min(c.sp.min+Math.floor(Math.random()*(c.sp.max-c.sp.min+1)),t.maxhp-t.hp);t.hp+=heal;lines.push(t.name+'の HPが '+heal+' かいふく！');});
      renderStatus(true);
      G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','だいじなもの','とじる']};
      fieldInfo(lines);return;
    }
    if(c.sp.type==='revive'){
      const dead=party.filter(p=>p.hp<=0);
      if(dead.length===0){fieldInfo(['たおれている なかまは いない。']);return;}
      openFieldTarget({type:'revive',caster:c.p,spell:c.sp},dead);return;
    }
    if(c.sp.type==='cure'){openFieldTarget({type:'cure',caster:c.p,spell:c.sp});return;}
    openFieldTarget({type:'spell',caster:c.p,spell:c.sp});return;
  }
  if(m.kind==='altar'){
    const say=(L)=>{G.mode='msg';showMsg(L,()=>{G.mode='field';});};
    cmdWin.style.display='none';
    if(m.sel>=party.length){G.mode='field';G.menu=null;return;}
    const p=party[m.sel];G.menu=null;
    if(!p){G.mode='field';return;} // 不正選択の防御
    if(p.hp<=0){G.mode='field';say(['しんでいる ものの ちは ながれない。']);return;}
    if(p.cls==='hero'||p.cls==='warrior'){
      const dmg=Math.max(1,Math.floor(p.maxhp*0.25));
      p.hp=Math.max(1,p.hp-dmg);AU.hit();render();
      G.mode='field';
      say(['さいだんが '+p.name+'の ちを こばんだ！',
        '「──けがれた ち だ！」','はげしい いたみ！ '+p.name+'に '+dmg+'の ダメージ！',
        '（つるぎを にぎる ものの ちは うけつけない ようだ）']);
    }else{
      p.hp=Math.max(1,p.hp-5);G.flags.castleSwitch=true;AU.win();render();
      G.mode='field';
      say([p.name+'は ゆびさきを さいだんに かざした。',
        'ひとしずくの ちが、こくいんに すいこまれていく──',
        'ゴゴゴゴ…… とおくで なにかが くずれる おとがした。',
        '（1かいの けっかいが きえた）']);
    }
    return;
  }
  if(m.kind==='arena'){
    if(m.sel>=m.list.length){cmdWin.style.display='none';G.menu=null;G.mode='field';return;}
    const r=m.list[m.sel];
    cmdWin.style.display='none';G.menu=null;
    party.forEach(mem=>{mem.hp=mem.maxhp;mem.mp=mem.maxmp;}); // 再戦前に全回復
    G.mode='field';
    G._rematchKind=r.key;
    startBattle(r.key);
    if(G.battle)G.battle.rematch=r.key;
    return;
  }
  if(m.kind==='keyitem'){
    if(m.sel>=m.ks.length){
      G.menu={kind:'fmenu',sel:6,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','だいじなもの','とじる']};
      renderCmd(G.menu,'メニュー');return;
    }
    const k=m.ks[m.sel];
    cmdWin.style.display='none';G.menu=null;G.mode='msg';
    showMsg(k.t,()=>{G.mode='menu';openKeyItems();});
    return;
  }
  if(m.kind==='emember'){
    if(m.sel>=party.length){G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','だいじなもの','とじる']};renderCmd(G.menu,'メニュー');return;}
    openEquipSlot(m.sel);return;
  }
  if(m.kind==='eslot'){
    if(m.sel===0){openEquipList(m.mi,'w');return;}
    if(m.sel===1){openEquipList(m.mi,'a');return;}
    openEquipMember();return;
  }
  if(m.kind==='elist'){
    const p=party[m.mi];

    m.caster.mp-=m.sp.mp;AU.spell();

      const d2=lq2r[town];

      return;
    }
    const dst=MAPS[town].warps&&MAPS[town].warps.D;
    if(!dst){ // もどり先の座標が ない まちへの ほけん
      G.mode='msg';render();

      return;
    }
    P.map='field';P.x=dst.x;P.y=dst.y;G.trail=[];updateBGM();
    G.mode='msg';render();
    showMsg([m.caster.name+'は '+m.sp.name+'を となえた！',MAPS[town].name+'の まえに もどった。'],()=>{G.mode='field';});
    return;
  }
  if(m.kind==='ftarget'){confirmFieldTarget();return;}
}

function pickEnemy(){
  const byMap={field2:['krat','kbat','keye','kflower','kmush'],yakata1:['keye','kbat','grim'],yakata2:['keye','kmush','grim'],crypt1:['skelp','ksnake','wisp2'],crypt2:['skelp','ksnake','wisp2','grim'],field3:['statue','aeye','kmush','kflower'],sanctum1:['statue','aeye','wraith'],sanctumB1:['statue','aeye','wraith','grim'],field4:['swolf','kwashi','icesprit'],sandou1:['icesprit','swolf','wraith'],sandou2:['swolf','kwashi','icesprit'],field:['zcat','mpuyo','kwashi','books'],castle:['shinkohei','inorikage','skelk'],castle2:['shinkohei','skelk','inorikage','madohei'],tower:['books','mpuyo','zcat'],tower2:['madohei','mpuyo','books','flask'],tower3:['madohei','flask','zcat','books'],cave:['bat','thief','goblin','skel'],depths:['troll','dknight','shadow','ogre']};
  if(byMap[P.map]){
    const pool=ENEMIES.filter(e=>byMap[P.map].includes(e.key));
    return JSON.parse(JSON.stringify(pool[Math.floor(Math.random()*pool.length)]));
  }
  const z=zoneAt(P.x,P.y);
  const pool=ENEMIES.filter(e=>e.zone===z||(e.zone===z-1&&Math.random()<0.4));
  const list=pool.length?pool:ENEMIES.filter(e=>e.zone===0);
  return JSON.parse(JSON.stringify(list[Math.floor(Math.random()*list.length)]));
}
function startBattle(kind){
  if(G.battle)return; // 二重開始ガード：進行中の戦闘を差し替えない（撃破誤表示の根本原因）
  G.msgQ=[];G.msgCb=null; // 前の場面のメッセージ残留を掃除
  G.steps=0;AU.enc();
  document.getElementById('battle-flash').classList.add('bflash');
  setTimeout(()=>document.getElementById('battle-flash').classList.remove('bflash'),450);
  let enemies=[];
  if(kind==='zoldea')enemies=[JSON.parse(JSON.stringify(BOSS))];
  else if(kind==='lumina')enemies=[JSON.parse(JSON.stringify(LUMINA))];
  else if(kind==='rugozaga'){
    enemies=[JSON.parse(JSON.stringify(MIDBOSS.rugo)),JSON.parse(JSON.stringify(MIDBOSS.zaga))];
  }
  else if(kind&&MIDBOSS[kind])enemies=[JSON.parse(JSON.stringify(MIDBOSS[kind]))];
  else{
    const proto=pickEnemy();
    let n=1;
    if(party.length>=2&&Math.random()<0.40)n++;

    for(let i=0;i<n;i++){
      const e=JSON.parse(JSON.stringify(proto));
      e.dispName=e.name+(n>1?String.fromCharCode(65+i):'');
      enemies.push(e);
    }
    const LQ2_MAPS={toros:1,field2:1,liberion:1,yakata1:1,yakata2:1,yakata3:1,crypt1:1,crypt2:1,daiseido:1,field3:1,sanctum1:1,sanctumB1:1,sanctum2:1,field4:1,sandou1:1,sandou2:1,summit:1,tower:1,tower2:1,tower3:1,tower4:1,field5:1,haruna:1,field:1,nord:1,castle:1,castle2:1,castle3:1,shinen:1};
    if(!LQ2_MAPS[P.map]&&Math.random()<0.04){ // レアキャラ乱入（前作エリアのみ）
      const sd=ENEMIES.find(x=>x.key==='syun');
      enemies=[JSON.parse(JSON.stringify(sd))];
    }
  }
  enemies.forEach(e=>{e.maxhp=e.hp;if(!e.dispName)e.dispName=e.name;
    const dx=G.dex[e.key]=G.dex[e.key]||{seen:0,kill:0};dx.seen++;});
  G.battle={enemies,named:kind||null,isBoss:(kind==='zoldea'||kind==='lumina'),cur:0,fled:false};
  G.mode='battle';updateBGM();
  setTimeout(()=>{
    renderBattle();
    const first=enemies[0];
    const intro=[enemies.length>1?first.name+'が '+enemies.length+'たい あらわれた！':first.name+'が あらわれた！'];
    const b2=G.battle;
    if(!kind){ // 通常エンカウントのみ：たまに先制／様子見
      const r=Math.random();
      if(r<0.12){ // 敵の先制
        intro.push('てきは いきなり おそいかかってきた！');
        showMsg(intro,()=>{
          b2.phase='exec';b2.auto=false;b2.queue={};G.menu=null;
          b2.order=aliveEnemies().map(e=>({t:'e',e}));b2.cur=0;nextActor();
        });return;
      }
      if(r<0.24){ // 敵は様子見（このラウンド敵は行動しない）
        intro.push('てきは こちらを じっと みている…');
        b2.watchOnce=true;
      }
    }
    showMsg(intro,()=>{startRound();});
  },420);
}
function aliveEnemies(){return G.battle?G.battle.enemies.filter(e=>e.hp>0):[];}
function renderBattle(){
  const b=G.battle;if(!b)return;
  ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#101020';ctx.fillRect(0,0,CW,CH*0.72);
  ctx.fillStyle='#183018';ctx.fillRect(0,CH*0.72,CW,CH*0.28);
  ctx.fillStyle='#fff';for(let i=0;i<24;i++){ctx.fillRect((i*97)%CW,80+(i*53)%180,1,1);}
  // 敵（生存分を横に並べる）
  const list=aliveEnemies();
  const xs=list.length===1?[0.5]:list.length===2?[0.32,0.68]:[0.2,0.5,0.8];
  G._ePos=[];
  list.forEach((e,i)=>{
    const N=e.art.length; // アート解像度（12/24）に応じて拡大率を調整
    const _raw=(b.named?144:(list.length>=3?96:120))/N;const scale=N>48?Math.max(1.0,(b.named?192:120)/N):Math.max(1,Math.round(_raw));
    const ox=CW*xs[i]-(N*scale)/2, oy=118+(i%2)*8;
    G._ePos.push({e,ox,oy,w:N*scale,h:N*scale});
    e.art.forEach((row,y)=>{for(let x=0;x<row.length;x++){const c=row[x];
      if(c==='.'||c===' ')continue;ctx.fillStyle=e.pal[+c-1]||'#fff';ctx.fillRect(ox+x*scale,oy+y*scale,scale,scale);}});
    if(list.length>1){ctx.fillStyle='#ccc';ctx.font='10px monospace';
      ctx.fillText(e.dispName.slice(-1),ox+6*scale-3,oy-4);}
  });
  if(b.named&&list[0]){const e=list[0];
    ctx.fillStyle='#400';ctx.fillRect(CW/2-80,96,160,8);
    ctx.fillStyle='#e04040';ctx.fillRect(CW/2-80,96,160*Math.max(0,e.hp)/(e.maxhp||e.hp),8);}
  // パーティの状態窓（上段・スプライトつき）
  const n=party.length;const bw=Math.floor((CW-8)/n);
  G._pPos=[];
  party.forEach((p,i)=>{
    const x=4+i*bw,y=4,h=76;
    G._pPos.push({x,y,bw,h});
    ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(x+2,y,bw-4,h);
    ctx.strokeStyle=(b.curMember===p&&p.hp>0)?'#ffd54a':(p.hp>0?'#888':'#444');
    ctx.lineWidth=(b.curMember===p&&p.hp>0)?2:1;
    ctx.strokeRect(x+2.5,y+0.5,bw-5,h-1);ctx.lineWidth=1;
    if(p.hp>0)drawArt(CHAR_ARTS[p.cls],x+6,y+4,24/CHAR_ARTS[p.cls].art.length);
    else{ctx.globalAlpha=0.3;drawArt(CHAR_ARTS[p.cls],x+6,y+4,24/CHAR_ARTS[p.cls].art.length);ctx.globalAlpha=1;
      ctx.fillStyle='#c04040';ctx.font='14px monospace';ctx.fillText('✝',x+12,y+22);}
    ctx.fillStyle=p.hp>0?'#fff':'#777';ctx.font='10px monospace';
    ctx.fillText(p.name,x+34,y+14);
    ctx.fillText('HP'+p.hp,x+34,y+28);
    ctx.fillText('MP'+p.mp,x+34,y+42);
    if(p.status&&p.status.poison){ctx.fillStyle='#c060e0';ctx.fillText('どく',x+bw-30,y+14);}
    else if(p.status&&p.status.sleep>0){ctx.fillStyle='#7ab0ff';ctx.fillText('ねむり',x+bw-38,y+14);}
    ctx.fillStyle='#333';ctx.fillRect(x+6,y+h-20,bw-14,5);
    const rate=Math.max(0,p.hp)/p.maxhp;
    ctx.fillStyle=rate>0.5?'#3fd88f':rate>0.25?'#e8b33e':'#e04040';
    ctx.fillRect(x+6,y+h-20,(bw-14)*rate,5);
    ctx.fillStyle='#333';ctx.fillRect(x+6,y+h-11,bw-14,4);
    if(p.maxmp>0){ctx.fillStyle='#4a80d0';ctx.fillRect(x+6,y+h-11,(bw-14)*p.mp/p.maxmp,4);}
  });
  drainFX();
}
// ダメージ数字・被弾フラッシュ（renderBattleの直後に重ね描き）
function queueFX(item){(G._fxQ=G._fxQ||[]).push(item);}
function drainFX(){
  const q=G._fxQ||[];if(!q.length)return;G._fxQ=[];
  q.forEach((f,qi)=>{
    if(f.kind==='e'){
      const p=(G._ePos||[]).find(pp=>pp.e===f.tgt);if(!p)return;
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(p.ox,p.oy,p.w,p.h);
      ctx.fillStyle=f.color||'#ffe07a';ctx.font='bold 20px monospace';ctx.textAlign='center';
      ctx.fillText(f.text,p.ox+p.w/2,p.oy-6-qi*3);ctx.textAlign='left';
    }else{
      const i=party.indexOf(f.mem);const p=(G._pPos||[])[i];if(!p)return;
      ctx.fillStyle=(f.color==='#8f8')?'rgba(80,220,120,0.22)':'rgba(220,60,60,0.32)';
      ctx.fillRect(p.x+2,p.y,p.bw-4,p.h);
      ctx.fillStyle=f.color||'#ff9090';ctx.font='bold 15px monospace';ctx.textAlign='center';
      ctx.fillText(f.text,p.x+p.bw/2,p.y+p.h/2+5);ctx.textAlign='left';
    }
  });
  const myBattle2=G.battle;
  setTimeout(()=>{if(G.battle&&G.battle===myBattle2)renderBattle();},380);
}
// ===== 攻撃・呪文の演出システム =====
function spellTheme(sp){
  const n=sp.name;
  if(/サンダー|スパーク/.test(n))return 'thunder';
  if(/ブレイズ|インフェルノ|フレイム/.test(n))return 'fire';
  if(/シャイン|セイント|ホーリー/.test(n))return 'holy';
  if(/カオス/.test(n))return 'dark';
  if(/メテオ/.test(n))return 'meteor';
  if(/オメガ/.test(n))return 'omega';
  return 'magic';
}
function fxPos(targets){
  return targets.map(o=>{
    if(o.t==='e'){const p=(G._ePos||[]).find(pp=>pp.e===o.e);return p?{x:p.ox,y:p.oy,w:p.w,h:p.h}:null;}
    const p=(G._pPos||[])[o.i];return p?{x:p.x,y:p.y,w:p.bw,h:p.h}:null;
  }).filter(Boolean);
}
function playFX(kind,targets,done){
  const def=FXDEFS[kind];
  if(!def||!G.battle){if(done)done();return;}
  const myBattle=G.battle; // この演出が属する戦闘
  let f=0;
  const step=()=>{
    if(G.battle!==myBattle)return; // 戦闘が終了/交代していたら完了処理ごと破棄
    renderBattle();
    fxPos(targets).forEach(p=>def.draw(p,f));
    f++;
    if(f<def.frames)setTimeout(step,def.iv);
    else setTimeout(()=>{if(G.battle===myBattle&&done)done();},def.iv);
  };
  step();
}
